# ─── Conventions (do this) ─────────────────────────────────────────────
do:
  - "One concept per PR. A PR that says 'and also' is two PRs."
  - "Build/typecheck/test green at every commit. No WIP commits on main."
  - "When adding a guess, mark it inline: `// ASSUMPTION: …` with enough context that `grep -rn ASSUMPTION` is a complete reconciliation list."
  - "Tests over docs. Where a decision is load-bearing (encryption round-trip, agent isolation, fanout authz), write a test that fails the build if the property breaks."
  - "Type the boundaries. Zod at every API body. Drizzle inferred types at every DB call. Don't trust shapes from JSON.parse() ever."
  - "Server-rendered first. Client components only where encryption (or IndexedDB, or live streaming) requires it."
  - "Restraint over ornament — applies to copy and visuals on /trust and /app/*, not just the brand."

# ─── Conventions (don't do this) ───────────────────────────────────────
do_not:
  - "Don't relitigate locked decisions. If something is in DECISIONS.md without GUESSED, it doesn't open up in the PR."
  - "Don't swap tweetnacl for libsodium-wrappers. The latter has a broken ESM bundle; this was already debugged in PR-04."
  - "Don't add any third-party script that lands in the browser without first updating /trust to disclose it AND amending the CSP allowlist in middleware.ts. /trust says 'no third-party analytics, no marketing pixels, no session-replay' and the CSP enforces that."
  - "Don't import schema.messages / schema.threads / schema.threadMembers / schema.deviceKeys / @/lib/db/threads from anywhere under app/api/agent/. tests/agent-isolation.test.ts will fail the build if you do."
  - "Don't store any user-to-user message plaintext on the server. Don't store any key that decrypts user-to-user messages. The schema enforces this; don't add columns that walk it back."
  - "Don't write to .env.local or commit it. Don't paste real secrets into any committed file."
  - "Don't run `npm run db:push` for first-time prod schema apply — the interactive inquirer prompt is unreliable. Use `npx drizzle-kit migrate` instead. (db:push is fine for local-dev iteration.)"
  - "Don't bypass the CI gates by skipping or relaxing them; fix the underlying problem instead."
  - "Don't add comments that just restate the code. Comments should explain WHY or describe a non-obvious invariant."
  - "Don't add emoji to source files. Anywhere."

# ─── Locked decisions ──────────────────────────────────────────────────
# Source of truth: DECISIONS.md. All 20 originally-GUESSED decisions
# were locked in PR-12 (Pass A and Pass B). Highlights:
locked_decisions:
  reference: DECISIONS.md
  highlights:
    - "Stack: Next 15 + Tailwind v4 + Drizzle/Neon + Clerk + Anthropic Sonnet 4.5 + tweetnacl"
    - "Zero-human app service path: /app/onboarding → /app/verification → /app/billing → /app/matches → /app/salaam → /app/family → /app/threads"
    - "Three trust surfaces still matter: /trust (public contract), /app/threads (E2E), /app/agent (server-mediated)"
    - "Per-device fanout encryption (one ciphertext row per recipient device per send), NOT MLS / sender-key"
    - "Multi-generation device keys; rotation appends, server revokes; old generations stay locally for past-message decrypt"
    - "Key recovery: NONE, by choice. Clearing IndexedDB = losing the device. /trust says so."
    - "Fingerprint verification: first 16 pubkey bytes hex-grouped, in /app/settings + thread page header"
    - "1:1 threads not deduped server-side; group threads cap at 10 members"
    - "Agent rate limit: 6 req/min/user"
    - "Agent system prompt: minimal restraint — locked in lib/ai/client.ts"
    - "User mirror: id + primary email only"
    - "Account delete: keeps thread_members + message ciphertext (other members still need them); soft-deletes users; hard-deletes from Clerk"
    - "Single-region Neon (iad1 / us-east-1)"
    - "MIT license; repo public; disclosure email fozleyr@gmail.com"
    - "Clerk-hosted UI (custom UI is a later track)"
    - "No sealed-sender — sender id is on the row by design (used for membership authz)"
    - "Real-time delivery via SSE (server polls 1.5s, EventSource resumes via Last-Event-ID)"
    - "Optimistic composer UX: render at ~0ms, replace by senderId + plaintext match when SSE delivers"
    - "Decrypt-fail visibility: render placeholder, don't drop"
    - "Strict CSP with per-request nonce (middleware.ts); enforces no-third-party-script"
    - "Bundle budget: 200 KB First Load JS per route, 130 KB shared chunks; CI-enforced"

# ─── Assets / design ───────────────────────────────────────────────────
