# trust-app — Codex Handoff
#
# A self-contained briefing for ChatGPT Codex (or any cloud-based coding
# agent) to pick up `trust-app` and carry it forward. Read top to bottom.
# Every section is meant to stand on its own; cross-references point at
# files in the repo, not external systems.
#
# This file is safe to share publicly: secrets are never inlined, only
# their location and how to retrieve them.

# ─── Header ────────────────────────────────────────────────────────────
meta:
  project: trust-app
  one_line: >-
    End-to-end encrypted messaging product with a separate Claude
    assistant. The /trust page documents the contract; tests + CSP +
    schema all enforce it.
  handoff_to: chatgpt-codex
  handoff_from: claude-code (Opus 4.7, 1M context)
  handoff_date: 2026-05-05
  current_pr: 28 (zero-human service path)
  commits_on_main: 35
  primary_language: TypeScript (strict)
  build_status: green (typecheck + 42 vitest tests + bundle budget + db:check)

repo:
  url: https://github.com/fozleyr-beep/trust-app
  visibility: public
  default_branch: main
  ci: GitHub Actions (.github/workflows/ci.yml) on push + PR

production:
  url: https://trust-app-three.vercel.app
  status: READY
  surface_verified:
    - "GET /            → 200 (Sakinah landing page)"
    - "GET /trust       → 200 (CSP + HSTS + Permissions-Policy)"
    - "GET /sign-in     → 200 (Clerk-hosted UI)"
    - "GET /sign-up     → 200"
    - "GET /api/health  → {ok: true, ts: <iso>}"
    - "GET /app         → 307 to /sign-in?redirect_url=… (auth gate)"
    - "GET /walkthrough → 200 (30-second Sakinah flow)"
  surface_runtime_notes:
    - "/api/agent — uses direct ANTHROPIC_API_KEY when present; production can also use Vercel AI Gateway via OIDC."
    - "/api/webhooks/clerk — optional canonical sync; lazy-backfill covers signed-in users in v1."
    - "/api/billing/checkout — opens Stripe Checkout when STRIPE_SECRET_KEY + STRIPE_PRICE_ID are set; otherwise returns a launch-gate 501."
    - "/api/billing/webhook — verifies STRIPE_WEBHOOK_SECRET, records billing_events, updates service_entitlements."

# ─── Read these first ──────────────────────────────────────────────────
critical_reads:
  order:
    - path: README.md
      why: 5-minute orientation; setup + layout + the trust contract table
    - path: DECISIONS.md
      why: locked product/design/stack decisions; do not relitigate
    - path: handoff.yaml
      why: structural source of truth (tokens, schema, API, flows)
    - path: CLAUDE_CODE_PROMPT.md
      why: PR-by-PR history with commits; house style notes
    - path: DEPLOY.md
      why: production deploy runbook; Vercel + Neon + Clerk setup
    - path: HANDOFF-pr27.yaml
      why: session log for the deploy itself — known issues, workarounds
    - path: SECURITY.md
      why: disclosure scope, safe-harbor, response timelines

  read_after_those:
    - app/trust/page.tsx          # the contract that everything else defends
    - lib/db/schema.ts            # ground-truth data model
    - middleware.ts               # auth + CSP enforcement
    - tests/agent-isolation.test.ts  # the load-bearing isolation guarantee

# ─── Quickstart ────────────────────────────────────────────────────────
quickstart:
  fresh_clone:
    - "git clone https://github.com/fozleyr-beep/trust-app.git"
    - "cd trust-app"
    - "cp .env.example .env.local"
    - "# fill in: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY, CLERK_SECRET_KEY,"
    - "#          DATABASE_URL"
    - "# optional local assistant probe: AI_GATEWAY_API_KEY or ANTHROPIC_API_KEY"
    - "# optional billing launch gate: STRIPE_SECRET_KEY, STRIPE_PRICE_ID, STRIPE_WEBHOOK_SECRET"
    - "npm install"
    - "set -a; source .env.local; set +a"
    - "npm run doctor              # red lines = fix before continuing"
    - "npx drizzle-kit migrate     # apply migrations to your Neon DB"
    - "npm run typecheck && npm test && npm run build"
    - "npm run dev                 # http://localhost:3000"

  daily_loop:
    - "npm run dev"
    - "npm run typecheck            # before any commit"
    - "npm test                     # before any PR"
    - "npm run db:check             # if you touched lib/db/schema.ts"
    - "npm run check:bundle         # if you added a dep or large component"

  deploy:
    - "git push                     # CI runs; on green, Vercel auto-deploys main"
    - "Watch https://vercel.com/fozleyr-beeps-projects/trust-app/deployments"

