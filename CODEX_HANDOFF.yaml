# =============================================================================
# 13. ACCEPTANCE CRITERIA (block release if any fail)
# =============================================================================
acceptance_v1:
  trust:
    - Every trust chip in production names a specific agent + timestamp.
    - No <Verified /> component without `agent` prop. Lint rule blocks it.
    - Audit log captures every agent decision with hashed prompt+response.
    - Wali digest never includes verbatim message text (server-validated).
  privacy:
    - No photo visible to anyone before mutual interest, full stop.
    - Wali observer cannot reply into a thread (server-enforced 403).
    - Voice recordings deleted from R2 within 24h of Watim drafting public layer.
    - Server cannot decrypt user-to-user messages.
    - Sabr surfaces to seeker only; never to Sakinah staff or other party.
  i18n:
    - Every component renders correctly with dir=rtl and Arabic strings.
    - All numbers render with `tnum` font feature.
    - Mobile landing renders cleanly at 360, 390, 428 viewport widths.
  hygiene:
    - tsc --noEmit passes
    - eslint --max-warnings=0 passes
    - vitest unit tests green
    - playwright e2e green: rtl render, observer 403, gated photo 403, salaam quota,
      sabr-triage gated by safety_reviewer role
    - lighthouse a11y score ≥ 95 on all public routes
    - prefers-reduced-motion honored everywhere (girih still, tawaf still, settles instant)
  visual:
    - No green-as-Islam shorthand. No mosque silhouettes. No stock photos.
    - Sage (#8A9A7B) appears only in TrustChip, AgentBubble dot, accept states.
    - Brass (#A88547) appears only on the marketing landing's right-edge thread.

# =============================================================================
# 14. EIGHT-PR PLAN (sequence is mandatory)
# =============================================================================
pr_plan:
  - id: PR-01
    title: Project skeleton + brand + i18n
    weeks: 1-2
    scope:
      - Next.js 15 app router init, TypeScript strict
      - Tailwind v4 + brand_tokens.css_root
      - next-intl scaffold with [en, ar], dir=rtl supported
      - Clerk auth + Twilio Verify wrapper
      - Drizzle schema for §5 tables (full set including new v7 tables)
      - Base layout with bilingual <html dir lang> attrs
      - ESLint rule blocking <Verified /> and bare sage usage
      - ESLint rule blocking #A88547 outside app/(marketing)/
      - Playwright base config

  - id: PR-02
    title: Marketing surface (landing desktop + mobile, /trust, /for-families)
    weeks: 3-5
    scope:
      - / desktop landing (hero, honest fold, how it works, covenant, stories, dua)
      - / mobile landing at 390px primary
      - /trust deep page (long-form 4-agent argument, audit log demo, covenant in code)
      - /for-families deep page (three principles, FAQ, walis-are-free)
      - Girih SVG component (8-fold khatim, breathing 14s loop)
      - ArchFrame SVG component (Persian four-centred)
      - Brass thread component (single-instance enforcement via React context guard)
      - prefers-reduced-motion respected
    why_first: this is also the recruiting surface; ship it before private surfaces.

  - id: PR-03
    title: Onboarding (4 routes) + Hafiz integration
    weeks: 6-8
    scope:
      - /onboarding/greet, /verify, /voice, /family
      - Persona + Stripe Identity webhooks
      - Voice recorder + Web Speech API live transcription
      - Watim drafts layer_public via Anthropic SDK
      - User reviews and approves before publish
      - 24h auto-purge of voice recordings (Vercel cron)

  - id: PR-04
    title: Discovery + Profile + PhotoGate
    weeks: 9-10
    scope:
      - /discovery (weekly cron, 3 cards, no infinite scroll)
      - Empty state copy from §8
      - /profile/edit (3-layer editor)
      - /profile/preview (match-eye view)
      - PhotoGate component with all four modes (default silhouette)
      - Per-photo signed URL pattern

  - id: PR-05
    title: Thread + Adil + Salaam
    weeks: 11-13
    scope:
      - /thread/:id with libsodium E2E
      - AgentBubble for Adil interventions
      - Consent prompts as in-thread agent messages with explicit accept/decline
      - Salaam send + receive states (one tap, 14-day expiry, 3/week quota)
      - Salaam quota meter UI
      - HandoffCeremony component
      - In-thread Sabr intervention surface ("Sabr paused this thread")

  - id: PR-06
    title: Wali observer surfaces
    weeks: 14-15
    scope:
      - /observe digest list
      - /observe/:thread_id read-only single-thread view + private channels
      - Server middleware enforcing observer 403
      - Adil daily wali digest cron (writes to wali_digest table)
      - WaliDigestCard component
      - /observe/notes side-channel (libsodium, scoped to family_link)
      - /observe/ask-watim private agent channel

  - id: PR-07
    title: Settings + Audit + Invite + Sabr triage console
    weeks: 16-18
    scope:
      - /settings/agents permission toggles (with locked rows for §1 promises)
      - /settings/audit 90-day timeline + JSON export
      - /settings/family-link manage observers (incl. step-back)
      - /invite invite-a-loved-one flow
      - /admin/sabr triage console for safety_reviewer role
      - Role-based middleware (admin route hard-gated)

  - id: PR-08
    title: Accessibility, perf, observability, ship-readiness
    weeks: 19
    scope:
      - Lighthouse passes on every public route (a11y ≥ 95)
      - prefers-reduced-motion audited everywhere
      - PostHog wired with privacy-conserving config (no observer-flow funnels)
      - Sentry wired
      - Audit-event coverage: every agent decision flows into audit_event
      - Final RTL pass with native Arabic-speaking reviewer
      - Production env vars + secrets review

# =============================================================================
# 15. OUT OF SCOPE V1
# =============================================================================
out_of_scope_v1:
  - native mobile apps (PWA only — installable + push-capable)
  - video calls
  - paid tiers / subscription
  - matchmaker-aunt power-user role (year 2)
  - in-person event coordination
  - group chats / chaperoned threads
  - public profile URLs / SEO surface beyond /trust + /for-families + /stories
  - donations UI (table reserved; surface ships year 2)

# =============================================================================
# 16. ESCALATION TRIGGERS (only these come back to design)
# =============================================================================
escalation_triggers:
  - Renaming any agent (Watim / Hafiz / Adil / Sabr).
  - Any deviation from wali-read-only model.
  - Any new color outside the locked tokens.
  - Adding a paid tier, video, or in-person events.
  - Shortening the 12-minute voice-first onboarding.
  - Removing the 5 promises from /trust.
  - Allowing server to decrypt messages.
  - Allowing Sabr to surface to Sakinah staff.
  - Allowing the wali digest to include verbatim message text.
  - Adding referral rewards to /invite.
everything_else: ship it without sign-off.

# =============================================================================
# 17. VISUAL REFERENCE
# =============================================================================
