  visual_identity:
    status: implemented (Sakinah Sand & Sage)
    locked: true
    location: app/globals.css `@theme` block + tokens mirrored in handoff.yaml
    palette:
      ink: "#2a2722"
      ink-soft: "#5a5448"
      ink-muted: "#7a6e5c"
      ink-faint: "#a89d87"
      paper: "#f5efe6"
      paper-soft: "#eae2d2"
      surface: "#fffaf1"
      rule: "rgba(42, 39, 34, 0.09)"
      accent: "#8a9a7b"
    fonts:
      sans: Inter fallback stack
      serif: Fraunces fallback stack (used for headings and wordmark)
      mono: JetBrains Mono fallback stack (used for numbers, labels, codes)
    notes: |
      Public / and /trust now follow the Sakinah design archive: lowercase
      serif italic wordmark, Sand & Sage colors, four named agents, trust chips
      that name the agent, silhouette photo-gate preview, and live-vs-launch
      trust claims kept separate.

  brand_assets:
    logo: none
    illustrations: none
    icons: native unicode (no icon library)
    photos: none (deliberate per /trust restraint)

  copy:
    register: restrained, plain language, second-person "you"
    voice_examples:
      - "What we hold. What we don't."
      - "This page is the contract. If something below it diverges from what this page says, this page wins until we update it."
      - "We will not pursue legal action against good-faith research."

  screens_designed:
    /trust: 6 sections (E2E claim, what we hold, what AI sees, how to verify, where data lives, disclosure)
    /app: dashboard, 4 link tiles to threads/agent/settings/trust
    /app/threads: list with peer-email-derived titles
    /app/threads/new: textarea for comma-separated emails (cap 10 members)
    /app/threads/[id]: peer fingerprints (collapsible) + message stream + composer
    /app/agent: assistant chat with disclosure copy linking to /trust
    /app/settings: fingerprint, rotate (with confirm), export, sign-out, delete (with type-DELETE confirm)
    /sign-in /sign-up: Clerk-hosted (no custom design)

  screens_not_designed:
    - Any mobile-specific layouts (works at default but not explicitly responsive-tested below 375px)
    - Marketing page beyond /trust
    - Onboarding flow beyond Clerk
    - Empty states beyond what's shipped
    - 404 / error pages beyond Next defaults

# ─── Known issues / gotchas ────────────────────────────────────────────
gotchas:
  - id: drizzle-kit-push-interactive
    description: "`drizzle-kit push` uses an inquirer prompt; piped stdin doesn't always work. db:check can pass while migrations weren't actually applied."
    fix: "Use `drizzle-kit migrate` for prod schema apply (applies committed drizzle/*.sql files). db:push is OK for local dev iteration."

  - id: drizzle-kit-no-dotenv
    description: "drizzle-kit doesn't auto-load .env.local; DATABASE_URL must be in the process env."
    fix: "set -a; source .env.local; set +a before any drizzle-kit command."

  - id: clerk-secret-key-clipboard-only
    description: "Clerk secret key never appears in DOM as plaintext (input.value is masked); only retrievable via clipboard."
    fix: |
      Use the Clerk dashboard's copy button. If you need to capture
      programmatically, hook navigator.clipboard.writeText before
      clicking — see HANDOFF-pr27.yaml for the pattern.

  - id: clerk-webhook-iframe
    description: "Clerk's webhook UI is a Svix iframe; cross-origin click events from Chrome MCP don't reliably reach the 'Add Endpoint' button."
    fix: Configure the webhook manually in the Clerk dashboard (~3 min).

  - id: github-pat-workflow-scope
    description: "Pushing .github/workflows/*.yml requires the `workflow` PAT scope. Without it, `git push` is rejected by GitHub even if `repo` scope is set."
    fix: |
      Add the workflow scope to the PAT at github.com/settings/tokens.
      GitHub requires sudo-mode (email verification) to edit token
      scopes — this is the explicit human-in-the-loop gate.

  - id: vercel-region-name
    description: "Vercel uses `iad1` for Washington DC; this maps to AWS `us-east-1`, not `us-east-2`. Easy to mis-type in DEPLOY.md."
    fix: "iad1 ≡ us-east-1 (N. Virginia). Confirmed in handoff.yaml and HANDOFF-pr27.yaml."

  - id: libsodium-wrappers-broken-esm
    description: "libsodium-wrappers ships a broken ESM bundle and its package.json `exports` field blocks the CJS subpath — Next 15 webpack cannot load it."
    fix: "We use tweetnacl. Don't try libsodium-wrappers; if you need libsodium audit lineage, switch to libsodium.js (the JS-only fork)."

# ─── Codex-specific tips ───────────────────────────────────────────────
codex_notes:
  user_preferences_observed:
    - "Terse responses preferred — drop trailing summaries unless useful."
    - "Autonomous action preferred. 'next' usually means 'execute the highest-EV thing', not 'list options'."
    - "User course-corrects via short messages. Listen for them; don't ask for permission on reversible work."
    - "Account/credentials are real boundaries — don't pretend you can sign up for services or bypass OAuth. Surface honestly and stop."

  user_environment:
    os: macOS Darwin 25.3.0
    shell: zsh
    node: v24.15.0 (npm 11.x)
    git_user: fozleyr-beep <fozleyr@gmail.com>
    has_no: [homebrew, gh-cli, vercel-cli-globally]
    has_via_npx: [neonctl, vercel, drizzle-kit]
    has_mcp: [chrome-extension, computer-use]

  reversible_actions_codex_can_take_freely:
    - file edits, new files, refactors
    - "`git commit`, `git push origin main` (PAT is configured)"
    - "`npm install <dep>` (deps land in package.json + lockfile, reviewable)"
    - "`npx drizzle-kit generate` (creates migration; reviewable)"
    - "`npm run dev` / `npm run build` / `npm test`"
    - vercel deploy (auto-deploys on push)

  irreversible_actions_codex_must_confirm:
    - "`git push --force` to main"
    - "`git reset --hard` on a branch with uncommitted work"
    - dropping or destructive ALTER on Neon (manual SQL)
    - rotating Clerk keys (invalidates all sessions)
    - rotating the Anthropic key
    - sending email to real users
    - changing Vercel project visibility / billing
    - deleting the GitHub repo / changing visibility

# ─── How to extend (add a feature without compounding debt) ────────────
how_to_extend:
  before_starting:
    - "Re-read DECISIONS.md to confirm the feature isn't already locked-out."
    - "If it requires reopening a locked decision, that's a separate PR that updates DECISIONS.md FIRST. Don't bundle decision-reopen with implementation."
    - "Sketch the wire format and DB shape. If new tables, add them to lib/db/schema.ts and run `npx drizzle-kit generate`."
    - "Identify the load-bearing property and write a test that fails the build if it breaks."

  during_the_PR:
    - "One concept. If you find yourself writing 'and also', stop and split."
    - "ASSUMPTION-flag any guess inline."
    - "Add Zod schemas in lib/api/schemas.ts; never accept JSON.parse output without parsing."
    - "Update handoff.yaml structurally and DECISIONS.md if a new behavior is now locked."
    - "Bump the bundle budget in scripts/check-bundle-budget.ts ONLY if you're deliberately accepting the cost; document in the commit message."

  before_merging:
    - "npm run typecheck && npm run db:check && npm test && npm run check:bundle — all must be green."
    - "git push; CI reproduces the same gates; Vercel auto-deploys main."
    - "If you changed CSP, /trust copy, or schema — verify the live URL after deploy."

# ─── What this scaffold is NOT ─────────────────────────────────────────
# Listed for clarity so the gap is visible, not as TODOs.
not_in_scope:
  - "Read receipts, presence, typing indicators (deliberately — privacy)"
  - "Search across encrypted messages (no server-side index possible)"
  - "Group threads larger than ~10 (per-device fanout grows linearly; createThread enforces this cap)"
  - "Mobile native apps (web only)"
  - "Voice / video"
  - "Federation / interop with Signal, Matrix, MLS"
  - "Email transactional layer (no Resend / Postmark integration; thread invites require the recipient to have signed up first)"
  - "Multi-tenancy / workspaces"
  - "Admin console / impersonation"
  - "Public moderation tooling (would conflict with E2E)"

# ─── Glossary ──────────────────────────────────────────────────────────
glossary:
  device_key: An X25519 keypair generated in the browser. The "device" is the browser/IndexedDB pair; one user can have multiple.
  fanout: One ciphertext message produces N rows (one per recipient device) on send. The server sees ciphertext; the recipient's device sees plaintext after decrypt.
  ASSUMPTION: Inline-comment marker on a guess that needs human reconciliation. Currently zero in the codebase (PR-12 cleared them all).
  GUESSED: Same idea at the decision layer, in DECISIONS.md. Currently zero — all 20 are locked.
  /trust: The product's contract page. The page wins over implementation in spirit; tests + CSP + schema win in practice.

# ─── End ───────────────────────────────────────────────────────────────
