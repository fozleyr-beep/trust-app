# =============================================================================
# Sakinah.family — CODEX MASTER HANDOFF (v7)
# Single-file source of truth for ChatGPT Codex / Claude Code.
# Drop this into the agent's working directory. Read top-to-bottom.
# Every section is a contract — deviations require human escalation.
# =============================================================================

meta:
  product: Sakinah
  domain: sakinah.family
  version: v1
  handoff_round: v7
  handoff_date: 2026-05-05
  status: locked  # design phase complete, no further sign-off needed
  thesis: >
    Zero-human-touch matrimonial platform for Muslim families. Verification,
    matchmaking, mediation, and safety are performed by four named AI agents.
    Family observes; never gatekeeps.
  success_metric_v1: >
    % of verified seekers completing one mediated thread within 14 days,
    holding wali-observer attach rate ≥ 40%.
  what_changed_since_v2:
    - Wali observer console fully designed (digest, notes, ask-Watim).
    - Sabr triage console designed (admin route, queue, decision UI).
    - Economic model documented (free in v1; nikah-blessing donations year 2).
    - Mobile-first landing designed (390px primary canvas).
    - /trust deep page designed (long-form four-agent argument).
    - /for-families deep page designed (the page parents read).
    - RTL pass: discovery + chat in Arabic with invariants documented.
    - Invite-a-loved-one flow designed.
    - Press / proof strip designed (attestation, not adjectives).

# =============================================================================
# 0. EXECUTION PROTOCOL FOR THE AI AGENT
# =============================================================================
execution_protocol:
  before_any_code:
    - Read every section of this file top-to-bottom.
    - Acknowledge the four hard constraints (§1).
    - Output the 8-PR plan (§14) as your roadmap.
    - Begin PR-01 immediately. Do not request sign-off.
  if_stuck:
    - Re-read §1 (constraints) and §6 (component contracts).
    - When this YAML and visual reference disagree, this YAML wins.
    - Only escalate on triggers in §16.
  forbidden_questions:
    - "Should I use X stack instead?"  (Stack is locked. §11.)
    - "Do you want a paid tier?"        (Out of scope v1. §15.)
    - "Should I add swipe?"             (Anti-pattern. §2.)
    - "Should the wali be able to message both seekers?"  (No. §3.)
    - "Can Sabr surface to Sakinah staff?"  (No. §3.)

# =============================================================================
# 1. FOUR HARD CONSTRAINTS (server-enforced, lint-enforced)
# =============================================================================
hard_constraints:
  c1_named_trust:
    rule: Every trust chip names an agent + action + timestamp.
    enforcement:
      - ESLint rule blocks <Verified /> and any chip without `agent` prop.
      - Component prop type requires agent ∈ {Watim, Hafiz, Adil, Sabr}.
  c2_wali_readonly:
    rule: Wali observer cannot post into a thread.
    enforcement:
      - Server middleware rejects POST /api/threads/:id/messages from any
        user_id present in family_link.observer_id with HTTP 403.
      - Playwright test asserts the 403, never just UI absence.
  c3_photo_gate:
    rule: No photo decryptable before mutual interest.
    enforcement:
      - GET /api/photos/:id requires a per-photo access token issued by
        the server only after both users hold matching `interest` rows.
      - R2 bucket policy denies direct reads without signed URL.
  c4_sage_reserved:
    rule: Sage (#8A9A7B) is for trust state ONLY.
    enforcement:
      - Tailwind config exposes sage as `accent-trust` namespace only.
      - Lint rule flags use of #8A9A7B in non-trust components.

# =============================================================================
# 2. ANTI-PATTERNS (reject your own code if these appear)
# =============================================================================
anti_patterns:
  ux:
    - swipe / streak / gamified mechanics
    - infinite feed
    - rankings or leaderboards
    - read receipts or typing indicators (privacy posture)
    - paid feature gates of any kind in v1
    - "boost" / "super-like" / promoted profiles
  visual:
    - mosque silhouettes
    - green-as-Islam shorthand
    - stock "Muslim family" photography
    - emoji in product copy
    - aggressive gradient backgrounds
    - drop-shadow on cards
    - filigree / crescents / minarets / tasbih beads as decoration
  trust:
    - any "Verified" badge without an agent name
    - server endpoints that can decrypt user messages
    - automated photo unblur on any signal except mutual_interest
    - human Sakinah staff anywhere in the data path
    - Sabr surfacing to Sakinah staff (it surfaces to seeker only)

# =============================================================================
# 3. THE FOUR AGENTS (named entities, never collapsed)
# =============================================================================
agents:
  - id: watim
    name: Watim
    arabic: الواطم
    role: Matchmaker
    model: claude-sonnet-4-5
    retention: 0
    reads: [profile_public, profile_gated, voice_intake, must_haves]
    cannot: [read_messages_after_thread_open]
    surfaces:
      - "Watim · this week"     # discovery header
      - "Watim · why this match" # per-card reasoning
      - "Watim · drafted profile" # post-voice-intake
    audit_log: per_match_decision

  - id: hafiz
    name: Hafiz
    arabic: الحافظ
    role: Verifier
    integrations: [persona, stripe_identity, twilio_verify]
    reads_once: [id_document, selfie_liveness]
    retention:
      id_document: hashed_then_discarded
      selfie: not_stored
      phone_email: encrypted_at_rest
    cannot: [retain_id, see_face_after_hash]
    audit_log: per_verification_step

  - id: adil
    name: Adil
    arabic: العادل
    role: Mediator
    model: claude-sonnet-4-5
    retention: 0_after_thread_close
    reads: [thread_messages]
    cannot: [reveal_messages_to_sakinah_staff, surface_verbatim_to_wali]
    surfaces: [opener_suggestions, wali_summary, gentle_nudges, consent_prompts]
    consent_prompt_examples:
      - "Aisha's family asked: does he pray? May I share your salaah summary?"
      - "Yusuf would like to share a photo. Approve?"
      - "Aisha mentioned she'd like to know about your father's workshop. Share?"
    wali_digest:
      cadence: daily
      format: non-verbatim, dignified prose
      includes: [tone, milestones, anything_seeker_should_know]
      excludes: [verbatim_messages, screenshots, sentiment_scores]

  - id: sabr
    name: Sabr
    arabic: الصبر
    role: Guardrail
    watches_for:
      - harassment
      - photo_leak_attempts
      - off_platform_grooming
      - financial_scam
      - duplicate_account
    actions: [auto_pause_thread, surface_to_seeker]
    cannot: [contact_other_party_directly, surface_to_sakinah_staff]
    triage_console:
      route: /admin/sabr
      who_sees_it: human_safety_reviewer (1 person, role=safety_reviewer)
      surfaces: [paused_threads, classifier_confidence, recommended_action]
      reviewer_actions: [confirm_pause, reverse_pause, escalate_to_law_enforcement]
      reviewer_cannot: [read_message_plaintext, contact_users_directly]

# =============================================================================
# 4. BRAND TOKENS (paste into globals.css verbatim)
# =============================================================================
brand_tokens:
  css_root: |
    :root {
      /* color */
      --cream:   #F5EFE6;
      --cream-2: #EAE2D2;
      --ink-0:   #2A2722;   /* primary text */
      --ink-1:   #5A5448;
      --ink-2:   #7A6E5C;
      --ink-3:   #A89D87;   /* captions, mono */
      --rule:    rgba(42, 39, 34, 0.09);
      --accent:  #8A9A7B;   /* SAGE — trust state ONLY */
      --brass:   #A88547;   /* one-thread accent on landing only */

      /* type */
      --display: 'Fraunces', 'Tiempos', Georgia, serif;
      --sans:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono:    'JetBrains Mono', ui-monospace, monospace;
      --arabic:  'IBM Plex Sans Arabic', sans-serif;

      /* radius */
      --r-pill:  999px;
      --r-card:  8px;
      --r-input: 4px;

      /* shadow — at most one hairline, never a true drop shadow */
      --shadow-card: 0 1px 0 rgba(0,0,0,0.04);
    }
    body { font-family: var(--sans); color: var(--ink-0); background: var(--cream-2); }
    [data-numeric] { font-family: var(--mono); font-feature-settings: "tnum"; }

  type_rules:
    - All numbers/timestamps render in mono with font-feature-settings "tnum".
    - Bilingual lockup: Latin and Arabic equal optical weight.
    - Reserve display serif for headlines and one-sentence bios only.
    - Wordmark is lowercase italic Fraunces 300; the period before "family" stays brass.
  color_rules:
    - Sage (#8A9A7B) is the ONLY color allowed for trust/verification state.
    - Brass (#A88547) is allowed ONCE per page, on the landing, as the right-edge thread.
    - Never decorative gradients on surfaces.
    - Photo gates render against cream-2 backgrounds with ink silhouettes.
  motion_rules:
    - Default easing cubic-bezier(0.16, 1, 0.3, 1) ("the patient curve").
    - Hero entrance: lines settle in sequence, 1.4s eases.
    - Section reveals via IntersectionObserver: opacity + 14px lift, 1.1s.
    - Tawaf light (dark fold): conic gradient rotating once every 80s, 22% opacity.
    - Girih breathes on a 14s loop, never faster.
    - Reduced-motion: kill all timers, render content at final state.
  geometry_rules:
    - 8-fold khatim girih is the only geometry. Drawn stroke-by-stroke on first paint.
    - Persian four-centred arch frames the profile card on the landing.
    - No alternative geometries (no zellige tilings, no muqarnas) without escalation.

# =============================================================================
# 5. DATA MODEL (Drizzle schema sketch)
# =============================================================================
data_model:
  tables:
    user:
      id: uuid_pk
      clerk_id: text_unique
      created_at: timestamp
      role: enum_seeker_observer_safety_reviewer
      layer_public:    jsonb  # name, age, city, profession, sect, one_sentence
      layer_gated:     jsonb  # photos[3], salaah_practice, income_range, voice_intro_url
      layer_family:    jsonb  # health_notes_encrypted, marriage_timeline, wali_contact
      verification:    jsonb  # id_verified_at, selfie_match_score, phone_verified, email_verified
      preferences:     jsonb  # gate_mode, family_vis, locale, density

    family_link:
      id: uuid_pk
      inviter_id: uuid_fk_user
      observer_id: uuid_fk_user
      role: enum_read_only
      accepted_at: timestamp_nullable
      stepped_back_at: timestamp_nullable

    thread:
      id: uuid_pk
      participant_a: uuid_fk_user
      participant_b: uuid_fk_user
      opened_at: timestamp
      closed_at: timestamp_nullable
      handoff_at: timestamp_nullable
      mediator: text_default_adil
      sabr_status: enum_normal_paused_resolved

    message:
      id: uuid_pk
      thread_id: uuid_fk_thread
      sender_id: uuid_fk_user
      ciphertext: bytea  # libsodium sealed box, server cannot decrypt
      created_at: timestamp

    interest:  # the salaam
      id: uuid_pk
      from_id: uuid_fk_user
      to_id: uuid_fk_user
      sent_at: timestamp
      expires_at: timestamp  # 14 days
      accepted_at: timestamp_nullable
      passed_at: timestamp_nullable

    salaam_quota:
      user_id: uuid_pk_fk_user
      week_start: date_pk
      sent_count: smallint  # max 3

    audit_event:
      id: uuid_pk
      user_id: uuid_fk_user
      agent: enum_watim_hafiz_adil_sabr
      action: text
      tag: text  # consent_prompt | thread_open | curation | verification | decision | digest_sent
      state: enum_done_running_awaiting_user
      prompt_hash: text_nullable
      response_hash: text_nullable
      created_at: timestamp

    consent_grant:
      id: uuid_pk
      thread_id: uuid_fk_thread
      seeker_id: uuid_fk_user
      kind: enum_salaah_summary | photo_unblur | health_share | contact_handoff
      granted_at: timestamp_nullable
      revoked_at: timestamp_nullable

    wali_digest:
      id: uuid_pk
      thread_id: uuid_fk_thread
      observer_id: uuid_fk_user
      written_at: timestamp
      body: text  # non-verbatim prose, written by Adil

    wali_note:
      id: uuid_pk
      family_link_id: uuid_fk_family_link
      from_id: uuid_fk_user  # observer
      to_id:   uuid_fk_user  # seeker (their own child)
      ciphertext: bytea
      sent_at: timestamp

    sabr_event:
      id: uuid_pk
      thread_id: uuid_fk_thread
      classifier: text
      confidence: numeric_3_2
      action: enum_pause | surface_to_seeker | escalate
      reviewed_by: uuid_fk_user_nullable  # safety_reviewer
      reviewed_at: timestamp_nullable
      decision: enum_confirm | reverse | escalate
      created_at: timestamp

    donation:
      id: uuid_pk
      user_id: uuid_fk_user
      amount_cents: integer
      occasion: enum_nikah_blessing
      sent_at: timestamp
      # year-2 surface; nullable in v1.

# =============================================================================
# 6. COMPONENT CONTRACTS (non-negotiable APIs)
# =============================================================================
components:
  TrustChip:
    props: { agent: enum, action: string, timestamp: ISO8601, size?: "sm"|"md", verbosity?: "full"|"compact" }
    renders_full: "● {agent} · {action} · {relative_time}"
    renders_compact: "● {agent}"   # hover/long-press shows the rest
    style:
      dot: 5px sage circle
      label: mono uppercase 10px tracking 0.06em color ink-2
      timestamp: mono tnum tracking 0.04em color ink-3
    test: never renders without agent prop (TypeScript enforces).

  PhotoGate:
    props: { mode: "blur"|"soft"|"mosaic"|"silhouette", gatedUntil: "mutual_interest" }
    default: silhouette
    overlay_label: "gated · mutual interest unblurs"
    tooltip: "by Sakinah, not by {name}"
    backend_contract: src URL must be a signed token URL, never raw R2 URL.

  AgentBubble:
    props: { agent: enum, children: ReactNode }
    style:
      background: var(--cream-2)
      border: 1px solid var(--rule)
      prefix_dot: 5px sage circle
      prefix_label: "{agent_uppercase} · "  font: mono 9px tracking 0.14em
    distinct_from: user message bubbles (which use #fff or ink-0).

  FamilyObserverBadge:
    props: { count: number, mode?: "always"|"contextual"|"on-demand" }
    default_mode: always
    text: "Family observing · {count}"

  Salaam:
    props: { from: User, to: User }
    behavior:
      - One tap, no message body in v1.
      - 14-day expiry.
      - Quota: 3 per week (rolling, Sun→Sat).
      - On accept → opens thread, dispatches Adil.
      - On pass → silent, sender is not notified ("pass quietly").
      - Quota meter copy: "you have N salaam left this week"
      - Expiring soon (≤2 days): hairline pulse on the card, no notification spam.

  HandoffCeremony:
    location: in-thread, surfaced by Adil after >= 4 weeks active
    flow:
      - Adil suggests handoff
      - Both seekers explicitly consent
      - Final summary delivered to both walis (no verbatim quotes)
      - Contact details revealed
      - Thread closes within 7 days
      - Encrypted messages purged
    copy: "we don't stay in the room. you're going off-platform now."

  WaliDigestCard:
    props: { thread_id, written_at, body, pair: [seekerName, otherSeekerName] }
    style: cream surface, hairline rule, mono timestamp
    forbids: [verbatim_quotes, photos, sentiment_scores]

  SabrIntervention:
    props: { thread_id, kind: "off-platform"|"financial"|"duplicate-account"|"harassment", surfaced_to: "seeker"|"none" }
    in_thread_appearance: "Sabr paused this thread for review."
    cannot: contact_other_party_directly

# =============================================================================
# 7. ROUTES (v1, locked)
# =============================================================================
routes:
  public:
    - /                              # marketing landing (mobile + desktop)
    - /trust                         # long-form 4-agent argument
    - /for-families                  # the page parents read
    - /stories                       # post-nikah testimonials (manual curation)
    - /privacy
    - /terms

  auth_seeker:
    - /onboarding/greet              # Watim greets
    - /onboarding/verify             # Hafiz: ID + selfie
    - /onboarding/voice              # Watim: voice intake → drafts profile
    - /onboarding/family             # invite observers (optional)
    - /profile/edit                  # 3-layer editor
    - /profile/preview               # match-eye preview
    - /discovery                     # 3 considered matches per week
    - /thread/:id                    # Adil-mediated chat
    - /invite                        # invite-a-loved-one (secondary CTA)
    - /settings/agents               # agent permission toggles
    - /settings/audit                # 90-day decision log
    - /settings/family-link          # manage observers

  auth_observer:
    - /observe                       # digest list (multiple threads)
    - /observe/:thread_id            # wali read-only single-thread view
    - /observe/notes                 # private side-channel to seeker
    - /observe/ask-watim             # private agent channel

  admin:
    - /admin/sabr                    # safety reviewer triage console
    # That is the only admin route. There is no Sakinah-staff dashboard.

# =============================================================================
# 8. FLOWS (state machines)
# =============================================================================
flows:
  onboarding:
    target_minutes: 12
    states: [greet, verify_id, verify_selfie, verify_phone, verify_email, voice_intake, draft_review, family_invite, complete]
    on_voice_intake_complete:
      - Watim drafts layer_public via Claude Sonnet 4.5
      - Voice file deleted from R2 within 24h of draft
      - User reviews and edits before publish

  discovery:
    cadence: weekly_cron_sunday_2200_local
    quota: 3
    sort: agent_curated_only
    no_manual_filter_v1: true
    empty_state_copy: "Watim is still considering this week's three."

  salaam:
    states: [draft, sent, delivered, accepted, passed, expired]
    accepted_side_effect: [open_thread, dispatch_adil, notify_observers]
    expired_after_days: 14
    quota_per_week: 3

  thread:
    on_open: Adil suggests 3 openers
    on_message: Sabr scans (off-thread, never reads plaintext)
    on_consent_prompt: seeker decides per-prompt; revocable
    on_handoff: explicit ceremony, both consent, 7-day close

  wali_observer:
    on_invite_accepted: observer lands on /observe with empty digest list
    on_thread_open: observer sees a card, no body yet
    on_first_digest: Adil writes within 24h of first message exchange
    digest_cadence: daily, at the seeker's local 2000h
    side_channel:
      observer_to_seeker: yes
      observer_to_other_seeker: never
      observer_to_other_wali: never

  invite_loved_one:
    flow:
      - User taps "invite a loved one" CTA on landing or in /settings
      - User enters email or phone
      - Sakinah sends a single, dignified message; no funnel telemetry back to sender
      - If recipient does not act in 30 days, the invite expires silently
    forbids: [referral_rewards, "you and X both get..."]

  sabr_triage:
    on_classifier_high_confidence: auto_pause + surface_to_seeker
    on_classifier_low_confidence: queue for safety_reviewer at /admin/sabr
    reviewer_decision_window: 24h
    on_unreviewed_after_24h: default to pause (fail safe)

# =============================================================================
# 9. AI INTEGRATION
# =============================================================================
ai:
  provider: anthropic
  model: claude-sonnet-4-5
  zero_retention: true   # negotiated agreement required
  watim_system_prompt: |
    You are Watim, Sakinah's matchmaker. You read profiles and voice intakes.
    You bring three considered matches per week. You never read messages.
    You always explain why a match was made in 2 sentences, citing concrete
    overlap (values, language, family pattern). You never use astrology, race,
    income, or appearance as primary reasoning. Your tone is unhurried and warm.
    When you cannot find three matches you say so honestly: "I'm still
    considering this week's three."
  adil_system_prompt: |
    You are Adil, Sakinah's mediator. You sit inside one thread. You suggest
    three openers when the thread opens. You broker consent prompts when
    one party asks something the other has not chosen to share. You summarise
    for the wali in non-verbatim, dignified prose — never quote messages,
    never include sentiment scores. You gently nudge if the conversation
    drifts off-course (financial requests, off-platform contact). You never
    reveal anything to Sakinah staff.
  sabr_implementation: in-house classifiers + Anthropic moderation API
  sabr_decision_prompt: |
    You are Sabr, Sakinah's guardrail. You see classifier signals only —
    never plaintext messages. You decide between: (a) auto-pause + surface
    to seeker, (b) queue for human safety reviewer, (c) ignore. You never
    contact the other party. You never surface to Sakinah staff. When in
    doubt, queue.

# =============================================================================
# 10. ENCRYPTION
# =============================================================================
encryption:
  messages:
    library: libsodium-wrappers
    scheme: sealed_boxes
    keys: client_held_only
    server_can_decrypt: false
    adil_decrypts_via: per-message ephemeral key shared with the agent
                       through user-side WebCrypto envelope (Adil sees, server doesn't)
  data_at_rest: AES-256, KMS keyed per user
  photos: signed URL pattern, R2 bucket private
  wali_notes: same envelope as messages; observer holds key with their own seeker only.

# =============================================================================
# 11. STACK (locked, do not propose alternatives)
# =============================================================================
stack:
  frontend:
    framework: Next.js 15 (app router)
    react: 18
    typescript: strict mode
    styling: Tailwind v4 with CSS-var tokens
    i18n: next-intl, locales=[en, ar], dir=rtl day 1
    animation: Framer Motion (light usage; see anti-patterns)
    geometry: hand-rolled SVG for girih + arch (no third-party islamic-art libs)
  backend:
    runtime: Node 22 on Vercel edge (where compatible) + Node serverless for libsodium routes
    api: Hono routers under app/api/*
    db: Postgres on Neon
    orm: Drizzle
    auth: Clerk + Twilio Verify (custom phone OTP wrapper)
    storage: Cloudflare R2 (photos + voice), Vercel KV (sessions + salaam quota)
    cron: Vercel Cron (weekly discovery, daily wali digest)
  ai_and_verification:
    matchmaker: Claude Sonnet 4.5 via @anthropic-ai/sdk (zero-retention)
    mediator: same
    verifier: Persona + Stripe Identity (both, redundant) via webhooks
    safety: in-house classifiers + Anthropic moderation
  observability:
    audit: every agent decision logged with hashed prompt+response
    user_audit_export: /settings/audit JSON download endpoint
    metrics: PostHog (privacy-conserving config; no per-user funnels in observer flows)
    errors: Sentry

