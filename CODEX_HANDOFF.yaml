# ─── Stack ─────────────────────────────────────────────────────────────
stack:
  framework: next@15.5.15 (App Router, typedRoutes, react@19)
  language: typescript@5.7 strict
  styling: tailwind@4 (CSS-first, @theme block in app/globals.css)
  database: postgres on neon (@neondatabase/serverless HTTP driver)
  orm: drizzle@0.36
  auth: "@clerk/nextjs@6 (catch-all sign-in/up + svix-verified webhook)"
  ai_sdk: "@anthropic-ai/sdk"
  ai_model: claude-sonnet-4-5 (locked per DECISIONS.md)
  crypto: "tweetnacl (crypto_box: X25519 + XSalsa20-Poly1305)"
  validation: zod@4 (every API body)
  tests: vitest@4
  ci: github-actions
  deploy: vercel (region iad1)

  why_tweetnacl_not_libsodium: >-
    libsodium-wrappers ships a broken ESM bundle and its package.json
    `exports` blocks the CJS subpath, so Next 15 webpack cannot load it.
    tweetnacl is the same crypto_box primitive, same wire format,
    audited, with a clean ESM build. If you ever need libsodium audit
    lineage specifically, switch to libsodium.js (the JS-only fork).
    DECISIONS.md § Crypto primitive is locked on tweetnacl.

# ─── Architecture (1-paragraph each) ───────────────────────────────────
architecture:
  three_surfaces:
    /trust: >-
      Public, server-rendered, no client JS, indexable. The contract
      page. Pinned to a specific commit hash in the footer. Every claim
      has a corresponding test or runtime guarantee elsewhere in the
      codebase.
    /app/threads/[id]: >-
      End-to-end encrypted messaging. Each device generates an X25519
      keypair in the browser, persists to IndexedDB (multi-generation
      for rotation), and publishes the public half via /api/device-keys.
      Sending fans out one ciphertext row per recipient device. Server
      stores ciphertext, nonce, sender id, recipient device key id,
      timestamp — never plaintext, never any decryption key.
    /app/agent: >-
      Server-mediated chat with Claude Sonnet 4.5. NOT end-to-end
      encrypted — by design. The assistant is a separate conversational
      surface. The /trust page discloses this; tests/agent-isolation.test.ts
      asserts the agent route cannot import messaging schema.

  why_per_device_fanout_not_mls: >-
    Simpler to reason about for v1. Trades server storage (one row per
    recipient device per send) for cryptographic clarity. Above ~10
    members the fanout cost gets serious; that's the threshold for
    revisiting a sender-key / MLS design.

# ─── Data model ────────────────────────────────────────────────────────
# Source of truth: lib/db/schema.ts. Migrations: drizzle/0000_init.sql,
# drizzle/0001_messaging.sql.
data_model:
  users:
    fields: [id (uuid), clerk_id (unique), email, created_at, updated_at, deleted_at]
    notes: mirrored from Clerk via /api/webhooks/clerk; lazy-backfilled by lib/auth/current-user.ts on first authed request.

  device_keys:
    fields: [id (uuid), user_id (fk), device_id, public_key (bytea), created_at, revoked_at]
    indexes: [(user_id, device_id)]
    notes: |
      Secret half NEVER on server. Rotation = new row + prior row(s)
      for same (user_id, device_id) get revoked_at.

  threads:
    fields: [id (uuid), created_by (fk users), created_at]
    notes: no subject/title server-side; that's part of the encrypted stream.

  thread_members:
    pk: (thread_id, user_id)
    fields: [thread_id (fk), user_id (fk), added_at]

  messages:
    fields: [id (uuid), thread_id (fk), sender_id (fk users), recipient_device_key_id (fk device_keys), ciphertext (bytea), nonce (bytea), cipher_size, sent_at]
    indexes: [(thread_id, sent_at), (recipient_device_key_id)]
    notes: |
      One row per (recipient device) per send. Server holds zero
      plaintext and no key that decrypts these.

# ─── API surface ───────────────────────────────────────────────────────
# Wire schemas are in lib/api/schemas.ts (Zod) and routed via
# app/api/**/route.ts.
api:
  public:
    GET /:                    redirects to /trust
    GET /trust:               static (○), public, indexable
    GET /sign-in/* :          Clerk-hosted UI
    GET /sign-up/* :          Clerk-hosted UI
    GET /api/health:          { ok, ts }
    POST /api/webhooks/clerk: svix-verified; user.created/updated/deleted

  authed:
    GET /app:                 dashboard (lists 4 surfaces)
    GET /app/agent:           Claude assistant
    GET /app/settings:        fingerprint, rotate, export, sign-out, delete
    GET /app/threads:         list (with peer emails)
    GET /app/threads/new:     form → createThread server action
    GET /app/threads/[id]:    thread (Composer + MessageStream + PeerFingerprints)

    POST /api/device-keys:                  register/rotate device pubkey (revokes prior)
    POST /api/sender-keys:                  fetch peer pubkeys for verify+open
    GET  /api/threads/[id]/recipient-keys:  active member device pubkeys
    POST /api/threads/[id]/messages:        write fanout (one row per device); membership-checked
    GET  /api/threads/[id]/messages:        history fetch (pagination cap 200)
    GET  /api/threads/[id]/stream:          SSE; 1.5s server-side poll; resumes via Last-Event-ID
    GET  /api/me/threads:                   own thread metadata
    POST /api/me/delete:                    revoke keys + soft-delete user + Clerk admin delete
    POST /api/agent:                        Anthropic Sonnet 4.5 streaming; rate-limited 6/min/user

# ─── Flows ─────────────────────────────────────────────────────────────
flows:
  first_sign_in: >-
    Clerk-hosted /sign-in → /app → DeviceBootstrap generates X25519
    keypair in browser → persisted to IndexedDB → POSTed to /api/device-keys.
    If Clerk webhook hasn't fired yet, requireDbUser() creates the
    users row from currentUser() on first protected request.

  send_encrypted_message: >-
    Composer dispatches `trust-app:optimistic-send` → MessageStream
    renders state="sending" at ~0ms perceived latency → client GETs
    recipient-keys → encrypts once per recipient device →
    POSTs fanout. Server validates each recipientDeviceKeyId belongs
    to a current thread member (lib/messaging/authz.ts; 6 unit tests).
    SSE delivers the canonical row in ~1.5s; MessageStream replaces
    the optimistic entry by matching senderId + plaintext.

  ask_assistant: >-
    AgentChat POSTs full conversation history → /api/agent rate-limit
    gate → Zod validate → Anthropic Sonnet 4.5 streaming → server
    streams text deltas → client appends. Server logs token usage +
    latency on completion (agent.completed event).

  rotate_device_key: >-
    /app/settings → Rotate → keystore.rotateDevice() generates fresh
    keypair under same deviceId, appends to IndexedDB → POST /api/device-keys
    (server revokes prior, inserts new). Old keypairs stay in
    IndexedDB for past-message decryption.

  account_delete: >-
    /app/settings → type DELETE → POST /api/me/delete → server revokes
    every device_key for the user → soft-deletes users row → hard-deletes
    from Clerk via admin API → client wipes IndexedDB → redirect to /.

# ─── Tests ─────────────────────────────────────────────────────────────
tests:
  total: 38 across 6 files
  by_file:
    - lib/crypto/messaging.test.ts (5)
    - tests/agent-isolation.test.ts (6 — 1 presence + 5 forbidden patterns)
    - lib/messaging/authz.test.ts (6)
    - lib/messaging/recipients.test.ts (8)
    - lib/api/rate-limit.test.ts (6)
    - scripts/lib/parse-build-output.test.ts (7)

  load_bearing:
    - file: lib/crypto/messaging.test.ts
      asserts: |
        Encryption round-trip (Alice↔Bob), wrong-key rejection,
        ciphertext tamper detection, nonce uniqueness. Locks the
        cryptographic claim on /trust.
    - file: tests/agent-isolation.test.ts
      asserts: |
        Files in app/api/agent/ do not import schema.messages,
        schema.threads, schema.threadMembers, schema.deviceKeys, or
        @/lib/db/threads. Locks the "assistant cannot read messages
        between people" claim on /trust.
    - file: lib/messaging/authz.test.ts
      asserts: |
        Fanout authz rejects unknown device keys, non-member device
        keys (the exfiltration attempt), duplicates. Locks PR-08's
        runtime authz check.

ci_gates:
  on: every push and pull_request
  steps:
    - npm ci
    - npm run typecheck
    - npm run db:check       # Drizzle schema vs. committed migrations
    - npm test               # vitest, 38 tests
    - npm run check:bundle   # next build + per-route 200 KB / 130 KB shared
  bundle_budget:
    per_route_first_load_kb: 200
    shared_chunks_kb: 130
    current_high_water:
      - "/app/settings: 160 kB"
      - "/sign-in, /sign-up: 142 kB"

