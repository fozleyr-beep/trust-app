  fidelity_rule: >
    When this YAML and the canvas disagree, this YAML wins. Canvas is the
    visual reference for type sizes, spacing, chip shapes — not for behavior.

# =============================================================================
# 18. INITIAL PROMPT TO PASTE INTO CODEX / CLAUDE CODE
# =============================================================================
initial_prompt: |
  Read CODEX_HANDOFF.yaml top-to-bottom. It is the only source of truth.

  Acknowledge the four hard constraints in §1, output the 8-PR plan from
  §14 as your roadmap, then begin PR-01 immediately.

  Do not ask me to confirm decisions already in this file. Do not propose
  stack alternatives. Do not deviate from the component contracts in §6.

  When you finish a PR, run the §13 acceptance checks and only then move
  to the next PR.

  Stack is locked. Decisions are locked. Build.
