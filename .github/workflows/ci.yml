name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          # Build doesn't need real values — ClerkProvider is conditional and
          # DATABASE_URL is read lazily, so dummy values keep the build offline.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci
          CLERK_SECRET_KEY: sk_test_ci
          DATABASE_URL: postgres://ci@localhost/ci
          ANTHROPIC_API_KEY: sk-ant-ci
