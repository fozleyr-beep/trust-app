version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    groups:
      # One PR per upgrade family — reduces noise without losing isolation.
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
          - "@neondatabase/*"
      clerk:
        patterns:
          - "@clerk/*"
      anthropic:
        patterns:
          - "@anthropic-ai/*"
      crypto:
        patterns:
          - "tweetnacl"
          - "tweetnacl-util"
      # Dev tooling churns weekly; one combined PR keeps it manageable.
      dev-tooling:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci(deps)
